worker_processes auto;

events {
    worker_connections 8192; # 大量アクセスに耐えるプロ仕様
    multi_accept on;
}

http {
    # ----------------------------------------------------
    # 最強セキュリティ：サーバーのバージョンや詳細情報を隠蔽
    # ----------------------------------------------------
    server_tokens off;

    # ----------------------------------------------------
    # プロ仕様の超高速化設定（バッファ最適化と遅延防止）
    # ----------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ----------------------------------------------------
    # 高速データ圧縮：通信量を減らして読み込み速度を爆速に
    # ----------------------------------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ログの設定
    access_log /tmp/proxy_access.log;
    error_log /tmp/proxy_error.log warn;

    # プロキシサーバーの本体設定
    server {
        listen 8080; # 8080番ポートで待ち受けます
        server_name localhost;

        # ----------------------------------------------------
        # 完璧なリバースプロキシ設定
        # ----------------------------------------------------
        location / {
            # 経由先（フォワード先）のURL
            # ここでは例として「Yahoo Japan」を設定しています。任意の中継先に変更可能です。
            proxy_pass https://yahoo.co.jp;

            # プロが必ず入れる「アクセス元の情報を正しく伝える」ヘッダー群
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 接続エラー時のタイムアウト（これを超えたら諦める）
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # SSL/TLS通信の安全性を高める設定
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
        }
    }
}
